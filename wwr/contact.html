<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Contact Dry Oar White Water Rafting for trip inquiries, reservations, adventure information, and customer support.">
  <meta name="author" content="Duru Rowland">
  <title>Contact Us | Dry Oar White Water Rafting</title>
  <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
  <header>
    <img src="images/z-dryoarlogo.png"
      alt="logo image that boldy displays the brand name 'Dry Oar' " class="special_item">
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="trips.html">Trips</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </nav>
  </header>
  <main>

    <section class="contact-heading">
      <h1>Contact Dry Oar White Water Rafting</h1>

      <p>📍 245 River Canyon Road, Jackson Hole, Wyoming</p>
      <p>📞 +1 (307) 555-RAFT</p>
      <p>✉️ contact@dryoarrafting.com</p>
    </section>

    <section class="contact-layout">

      <div class="map-container">

        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2886.550770468218!2d-110.76242822441545!3d43.47992916324713!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x53531a42b1f5c6d9%3A0x6f5e6f2d3d7b7b6f!2sSnake%20River!5e0!3m2!1sen!2sus!4v1717555000000!5m2!1sen!2sus"
          allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
        </iframe>

      </div>

      <div class="form-container">

        <form action="#" method="post">

          <fieldset>

            <legend>Send Us a Message</legend>

            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>

            <fieldset class="radio-group">

              <legend>Purpose of Message</legend>

              <label for="general">
                <input type="radio" id="general" name="purpose" value="general-inquiry">
                General Inquiry
              </label>

              <label for="reservation">
                <input type="radio" id="reservation" name="purpose" value="reservation-question">
                Reservation Question
              </label>

              <label for="suggestion">
                <input type="radio" id="suggestion" name="purpose" value="website-suggestion">
                Website Suggestion
              </label>

            </fieldset>

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <label for="subscribe" class="checkbox-label">
              <input type="checkbox" id="subscribe" name="subscribe">
              Please subscribe me to the monthly newsletter
            </label>

            <button type="submit">Send My Message</button>

          </fieldset>

        </form>

      </div>

    </section>

    <section class="employee-section">

      <h2>Meet Our Team</h2>

      <div class="employee-gallery">

        <figure>
          <img src="images/employee-1.jpg" alt="Senior rafting guide leading an adventure team">
          <figcaption>
            <strong>Sarah Thompson</strong><br>
            Lead River Guide
          </figcaption>
        </figure>

        <figure>
          <img src="images/employee-2.jpg" alt="Rafting safety instructor smiling outdoors">
          <figcaption>
            <strong>Michael Reyes</strong><br>
            Safety Instructor
          </figcaption>
        </figure>

        <figure>
          <img src="images/employee-3.jpg" alt="Customer experience manager at Dry Oar Rafting">
          <figcaption>
            <strong>Emily Carter</strong><br>
            Customer Experience Manager
          </figcaption>
        </figure>

      </div>

    </section>

  </main>
  <footer>
    <p>&copy; 2026 | Dry Oar Rafting | Duru Rowland</p>
    <nav class="socialmedia">
      <a href="https://facebook.com" target="_blank"><img src="images/facebook-bw.svg"
          alt="facebook icon leading to facebook.com" width="40" height="40"></a>
      <a href="https://instagram.com" target="_blank"><img src="images/instagram-bw.svg"
          alt="instagram icon leading to instagram.com" width="40" height="40"></a>
      <a href="https://linkedin.com" target="_blank"><img src="images/linkedin-bw.svg"
          alt="linkedin icon" width="40" height="40"></a>
    </nav>
  </footer>
</body>

</html>
