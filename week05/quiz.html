<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Form</title>
  <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
  <main class="box">
    <h1>Basic HTML and CSS Quiz</h1>
    <form action="" class="box">
      <div class="quiz-item box">
        <label for="q1">1. What does the acronym HTML stand for?</label>
        <input type="text" id="q1" name="q1" required>
      </div>
      <div class="quiz-item box">
        <label for="q2">2. How are id and class attributes selected in CSS?</label>
        <textarea id="q2" name="q2"></textarea>
      </div>
      <div class="quiz-item box">
        <label for="q3">3. Which of the following is a valid CSS comment?</label>
        <select id="q3" name="q3">
          <option value="" selected disabled>Choose One ...</option>
          <option value=""># CSS comment</option>
          <option value="">// Valid CSS comment</option>
          <option value="">/* Valid CSS comment */</option>
        </select>
      </div>
      <div class="quiz-item box">
        <label for="q4">4. What does the acronym CSS stand for?</label>
        <input type="text" id="q4" name="q4">
      </div>
      <button type="submit" class="box">Submit Response</button>
    </form>
  </main>
</body>

</html>
